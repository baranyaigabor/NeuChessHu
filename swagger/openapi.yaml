openapi: 3.0.1
info:
  title: NeuChessHU Users API
  version: 1.0.0
  description: OpenAPI specification for the Users endpoints.

servers:
  - url: http://localhost
    description: Local backend
  - url: http://backend.vm2.test
    description: VM backend

tags:
  - name: Users
    description: User CRUD endpoints

paths:
  /api/users:
    get:
      operationId: users.index
      tags:
        - Users
      summary: List users
      responses:
        '200':
          description: Users returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollectionResponse'

    post:
      operationId: users.store
      tags:
        - Users
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreUserRequest'
            example:
              nickname: testUser
              email: testuser@example.com
              password: secret123
              first_name: Test
              last_name: User
              region: Hungary
              date_of_birth: '1970-01-01'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResourceResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/users/{user}:
    parameters:
      - name: user
        in: path
        required: true
        description: User id or nickname.
        schema:
          type: string
        examples:
          id:
            value: '1'
          nickname:
            value: testUser

    get:
      operationId: users.show
      tags:
        - Users
      summary: Get a user
      responses:
        '200':
          description: User returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResourceResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: users.update.put
      tags:
        - Users
      summary: Replace user fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              nickname: testUser
              email: testuser@example.com
              first_name: Test
              last_name: User
              region: Hungary
              date_of_birth: '1970-01-01'
              profile_picture: unknown
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResourceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    patch:
      operationId: users.update.patch
      tags:
        - Users
      summary: Update user fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              nickname: testUser
              email: testuser@example.com
              first_name: Test
              last_name: User
              region: Hungary
              date_of_birth: '1970-01-01'
              profile_picture: unknown
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResourceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      operationId: users.destroy
      tags:
        - Users
      summary: Delete a user
      responses:
        '204':
          description: User deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  schemas:
    StoreUserRequest:
      type: object
      required:
        - nickname
        - email
        - password
      properties:
        nickname:
          type: string
          minLength: 1
          maxLength: 14
          example: testUser
        email:
          type: string
          format: email
          maxLength: 255
          example: testuser@example.com
        password:
          type: string
          minLength: 1
          maxLength: 100
          example: secret123
        first_name:
          type: string
          nullable: true
          example: Test
        last_name:
          type: string
          nullable: true
          example: User
        region:
          type: string
          nullable: true
          example: Hungary
        date_of_birth:
          type: string
          format: date
          nullable: true
          example: '1970-01-01'

    UpdateUserRequest:
      type: object
      properties:
        nickname:
          type: string
          example: testUser
        email:
          type: string
          format: email
          example: testuser@example.com
        first_name:
          type: string
          nullable: true
          example: Test
        last_name:
          type: string
          nullable: true
          example: User
        region:
          type: string
          nullable: true
          example: Hungary
        date_of_birth:
          type: string
          format: date
          nullable: true
          example: '1970-01-01'
        profile_picture:
          type: string
          nullable: true
          example: unknown

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nickname:
          type: string
          example: testUser
        profile_picture:
          type: string
          nullable: true
          example: unknown
        email:
          type: string
          format: email
          example: testuser@example.com
        full_name:
          type: string
          example: Test User
        region:
          type: string
          example: Hungary
        date_of_birth:
          oneOf:
            - type: string
              format: date
              example: '1970-01-01'
            - type: string
              example: unknown
        is_active:
          type: string
          enum:
            - Online
            - Offline
          example: Offline
        white_matches:
          type: array
          items:
            type: object
        black_matches:
          type: array
          items:
            type: object
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    UserResourceResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    UserCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Not Found

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Not Found

    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Server Error