openapi: 3.0.1
info:
  title: NeuChessHU Users and Matches API
  version: 1.0.0
  description: OpenAPI specification for the Users endpoints and selected Matches endpoints.

servers:
  - url: http://localhost
    description: Local backend
  - url: http://backend.vm2.test
    description: VM backend

tags:
  - name: Users
    description: User CRUD endpoints
  - name: Matches
    description: Match index, show and store endpoints

paths:
  /api/users:
    get:
      operationId: users.index
      tags:
        - Users
      summary: List users
      responses:
        '200':
          description: Users returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollectionResponse'

    post:
      operationId: users.store
      tags:
        - Users
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreUserRequest'
            example:
              nickname: testUser
              email: testuser@example.com
              password: secret123
              first_name: Test
              last_name: User
              region: Hungary
              date_of_birth: '1970-01-01'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResourceResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/users/{user}:
    parameters:
      - name: user
        in: path
        required: true
        description: User id or nickname.
        schema:
          type: string
        examples:
          id:
            value: '1'
          nickname:
            value: testUser

    get:
      operationId: users.show
      tags:
        - Users
      summary: Get a user
      responses:
        '200':
          description: User returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResourceResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: users.update.put
      tags:
        - Users
      summary: Replace user fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              nickname: testUser
              email: testuser@example.com
              first_name: Test
              last_name: User
              region: Hungary
              date_of_birth: '1970-01-01'
              profile_picture: unknown
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResourceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    patch:
      operationId: users.update.patch
      tags:
        - Users
      summary: Update user fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              nickname: testUser
              email: testuser@example.com
              first_name: Test
              last_name: User
              region: Hungary
              date_of_birth: '1970-01-01'
              profile_picture: unknown
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResourceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      operationId: users.destroy
      tags:
        - Users
      summary: Delete a user
      responses:
        '204':
          description: User deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/matches:
    get:
      operationId: matches.index
      tags:
        - Matches
      summary: List matches
      responses:
        '200':
          description: Matches returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchCollectionResponse'

    post:
      operationId: matches.store
      tags:
        - Matches
      summary: Create a match
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreMatchRequest'
            example:
              match_id: 3|2-private-1-2-20260422120000
              white_id: '1'
              black_id: '2'
              gamemode: Blitz
              match_duration: 3|2
              moves: '[{"round":"1","white":"e4","black":"e5"}]'
              match_end_result: Checkmate
              winner_id: '1'
              winner_time: '02:15'
      responses:
        '201':
          description: Match created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResourceResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/matches/{match}:
    parameters:
      - name: match
        in: path
        required: true
        description: Match id.
        schema:
          type: string
        example: 3|2-private-1-2-20260422120000

    get:
      operationId: matches.show
      tags:
        - Matches
      summary: Get a match
      responses:
        '200':
          description: Match returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResourceResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    StoreUserRequest:
      type: object
      required:
        - nickname
        - email
        - password
      properties:
        nickname:
          type: string
          minLength: 1
          maxLength: 14
          example: testUser
        email:
          type: string
          format: email
          maxLength: 255
          example: testuser@example.com
        password:
          type: string
          minLength: 1
          maxLength: 100
          example: secret123
        first_name:
          type: string
          nullable: true
          example: Test
        last_name:
          type: string
          nullable: true
          example: User
        region:
          type: string
          nullable: true
          example: Hungary
        date_of_birth:
          type: string
          format: date
          nullable: true
          example: '1970-01-01'

    UpdateUserRequest:
      type: object
      properties:
        nickname:
          type: string
          example: testUser
        email:
          type: string
          format: email
          example: testuser@example.com
        first_name:
          type: string
          nullable: true
          example: Test
        last_name:
          type: string
          nullable: true
          example: User
        region:
          type: string
          nullable: true
          example: Hungary
        date_of_birth:
          type: string
          format: date
          nullable: true
          example: '1970-01-01'
        profile_picture:
          type: string
          nullable: true
          example: unknown

    StoreMatchRequest:
      type: object
      required:
        - match_id
        - white_id
        - black_id
        - gamemode
        - match_duration
        - match_end_result
      properties:
        match_id:
          type: string
          example: 3|2-private-1-2-20260422120000
        white_id:
          type: string
          example: '1'
        black_id:
          type: string
          example: '2'
        gamemode:
          type: string
          example: Blitz
        match_duration:
          type: string
          example: 3|2
        moves:
          type: string
          nullable: true
          description: Serialized moves payload.
          example: '[{"round":"1","white":"e4","black":"e5"}]'
        match_end_result:
          type: string
          example: Checkmate
        winner_id:
          type: string
          nullable: true
          example: '1'
        winner_time:
          type: string
          nullable: true
          example: '02:15'

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nickname:
          type: string
          example: testUser
        profile_picture:
          type: string
          nullable: true
          example: unknown
        email:
          type: string
          format: email
          example: testuser@example.com
        full_name:
          type: string
          example: Test User
        region:
          type: string
          example: Hungary
        date_of_birth:
          oneOf:
            - type: string
              format: date
              example: '1970-01-01'
            - type: string
              example: unknown
        is_active:
          type: string
          enum:
            - Online
            - Offline
          example: Offline
        white_matches:
          type: array
          items:
            $ref: '#/components/schemas/Match'
        black_matches:
          type: array
          items:
            $ref: '#/components/schemas/Match'
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    Match:
      type: object
      properties:
        match_id:
          type: string
          example: 3|2-private-1-2-20260422120000
        white_id:
          type: string
          example: '1'
        black_id:
          type: string
          example: '2'
        gamemode:
          type: string
          example: Blitz
        match_durations:
          type: string
          description: Response field name returned by MatchesResource for match_duration.
          example: 3|2
        played_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-04-22T12:00:00Z'
        moves:
          nullable: true
          oneOf:
            - type: string
              example: '[{"round":"1","white":"e4","black":"e5"}]'
            - type: array
              items:
                type: object
            - type: string
              example: unknown
        match_end_result:
          type: string
          example: Checkmate
        winner_id:
          type: string
          nullable: true
          example: '1'
        winner_time:
          type: string
          nullable: true
          example: '02:15'

    UserResourceResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    UserCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'

    MatchResourceResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Match'

    MatchCollectionResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Match'

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Not Found

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Not Found

    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Server Error